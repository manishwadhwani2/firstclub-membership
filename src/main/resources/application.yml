server:
  port: 8080

spring:
  application:
    name: firstclub-membership-service
  datasource:
    url: jdbc:h2:mem:firstclubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      # Run data.sql AFTER Hibernate creates tables.
      # Used to create partial unique index + ShedLock table
      # (these cannot be expressed via @Index annotation).
      mode: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.firstclub: DEBUG
    org.springframework.web: INFO
